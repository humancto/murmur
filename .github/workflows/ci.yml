name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Apple Silicon runners. macos-14 is the floor we ship against;
        # macos-15 catches Sequoia-era regressions early.
        os: [macos-14, macos-15]
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version
          sw_vers

      - name: Cache SPM checkouts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ matrix.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ matrix.os }}-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build

      - name: Test
        env:
          # Headless CI runners have no microphone — skip the gated
          # AudioCapture smoke test. Documented in CONTRIBUTING.md.
          MURMUR_SKIP_AUDIO_HARDWARE: "1"
        run: swift test

      - name: Build release binary
        run: swift build -c release --product Murmur

      - name: Assemble .app bundle (smoke)
        run: |
          ./scripts/make-app.sh
          file ./build/Murmur.app/Contents/MacOS/Murmur
          codesign --display --verbose=4 ./build/Murmur.app 2>&1 | head -10
